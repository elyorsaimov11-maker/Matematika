<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-Sinf Matematika Testi</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#4facfe,#00f2fe);
    margin:0;
    padding:20px;
}

.box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    margin-top:30px;
}

h1,h2{
    text-align:center;
    color:#0077cc;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid gray;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#0077cc;
    color:white;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#005fa3;
}

.question{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:12px;
}

.question h3{
    margin-bottom:10px;
}

label{
    display:block;
    background:white;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
    cursor:pointer;
}

#timer{
    text-align:center;
    font-size:28px;
    color:red;
    font-weight:bold;
    margin-bottom:20px;
}

.correct{
    background:#c8ffd2 !important;
}

.wrong{
    background:#ffd1d1 !important;
}

#quizBox{
    display:none;
}

#resultBox{
    display:none;
    text-align:center;
}

.result-text{
    font-size:30px;
    color:green;
    font-weight:bold;
}

.grade{
    font-size:45px;
    color:#ff6600;
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- 1-OYNA -->
<div class="box" id="infoBox">

<h1>4-SINF MATEMATIKA TESTI</h1>

<h2>O‘quvchi ma’lumotlari</h2>

<input type="text" id="ism" placeholder="Ismingiz">

<input type="text" id="familiya" placeholder="Familiyangiz">

<button onclick="startQuiz()">
Testni Boshlash
</button>

</div>

<!-- 2-OYNA -->
<div class="box" id="quizBox">

<div id="timer">
15:00
</div>

<h2>Matematika Savollari</h2>

<div id="quiz"></div>

<button onclick="finishQuiz()">
Testni Yakunlash
</button>

</div>

<!-- 3-OYNA -->
<div class="box" id="resultBox">

<h2>Test Natijasi</h2>

<div class="result-text" id="result"></div>

<div class="grade" id="grade"></div>

</div>

<script>

const allQuestions = [

{
question:"125 + 375 = ?",
answers:["400","500","550"],
correct:"500"
},

{
question:"720 ÷ 9 = ?",
answers:["80","90","70"],
correct:"80"
},

{
question:"45 × 6 = ?",
answers:["270","260","280"],
correct:"270"
},

{
question:"64 ning yarmi nechaga teng?",
answers:["16","32","64"],
correct:"32"
},

{
question:"9 × 9 = ?",
answers:["72","81","99"],
correct:"81"
},

{
question:"11 × 11 = ?",
answers:["121","111","101"],
correct:"121"
},

{
question:"Haftada necha kun bor?",
answers:["5","6","7"],
correct:"7"
},

{
question:"1000 - 478 = ?",
answers:["522","532","542"],
correct:"522"
},

{
question:"Kvadratning nechta tomoni bor?",
answers:["3","4","5"],
correct:"4"
},

{
question:"560 ÷ 7 = ?",
answers:["70","80","90"],
correct:"80"
},

{
question:"250 + 250 = ?",
answers:["450","500","550"],
correct:"500"
},

{
question:"36 × 2 = ?",
answers:["72","62","82"],
correct:"72"
},

{
question:"900 - 300 = ?",
answers:["500","600","700"],
correct:"600"
},

{
question:"Uchburchakning burchaklari yig'indisi?",
answers:["90°","180°","360°"],
correct:"180°"
},

{
question:"To‘g‘ri to‘rtburchakning nechta tomoni bor?",
answers:["4","5","6"],
correct:"4"
},

{
question:"5 × 8 = ?",
answers:["35","40","45"],
correct:"40"
},

{
question:"144 ÷ 12 = ?",
answers:["11","12","13"],
correct:"12"
},

{
question:"300 + 450 = ?",
answers:["650","750","850"],
correct:"750"
},

{
question:"800 - 275 = ?",
answers:["525","535","545"],
correct:"525"
},

{
question:"7 × 7 = ?",
answers:["42","49","56"],
correct:"49"
}

];

let selectedQuestions = [];

let timer;
let time = 900;

function startQuiz(){

let ism =
document.getElementById("ism").value;

let familiya =
document.getElementById("familiya").value;

if(ism === "" || familiya === ""){

alert("Iltimos ism va familiyangizni kiriting!");

return;

}

document.getElementById("infoBox").style.display = "none";

document.getElementById("quizBox").style.display = "block";

allQuestions.sort(() => Math.random() - 0.5);

selectedQuestions = allQuestions.slice(0,15);

const quizContainer =
document.getElementById("quiz");

quizContainer.innerHTML = "";

selectedQuestions.forEach((q,index)=>{

q.answers.sort(() => Math.random() - 0.5);

let html = `

<div class="question" id="question${index}">

<h3>${index+1}. ${q.question}</h3>

${q.answers.map(answer=>`

<label>

<input type="radio"
name="q${index}"
value="${answer}">

${answer}

</label>

`).join("")}

</div>

`;

quizContainer.innerHTML += html;

});

startTimer();

}

function finishQuiz(){

let score = 0;

selectedQuestions.forEach((q,index)=>{

let selected =
document.querySelector(`input[name="q${index}"]:checked`);

let questionDiv =
document.getElementById(`question${index}`);

if(selected){

if(selected.value === q.correct){

score++;

questionDiv.classList.add("correct");

}else{

questionDiv.classList.add("wrong");

}

}else{

questionDiv.classList.add("wrong");

}

});

clearInterval(timer);

document.getElementById("quizBox").style.display = "none";

document.getElementById("resultBox").style.display = "block";

let ism =
document.getElementById("ism").value;

let familiya =
document.getElementById("familiya").value;

document.getElementById("result").innerHTML =

`
${ism} ${familiya}<br><br>
Natijangiz: ${score} / 15
`;

let grade = "";

if(score >= 14){

grade = "5 BAHO";

}else if(score >= 11){

grade = "4 BAHO";

}else if(score >= 8){

grade = "3 BAHO";

}else{

grade = "2 BAHO";

}

document.getElementById("grade").innerHTML =
grade;

}

function startTimer(){

timer = setInterval(()=>{

let minutes = Math.floor(time / 60);

let seconds = time % 60;

seconds = seconds < 10 ? "0" + seconds : seconds;

document.getElementById("timer").innerHTML =
minutes + ":" + seconds;

time--;

if(time < 0){

clearInterval(timer);

finishQuiz();

}

},1000);

}

</script>

</body>
</html>
